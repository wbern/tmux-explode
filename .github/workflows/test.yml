name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell sources
        run: shellcheck -S warning scripts/*.sh tests/*.sh hooks/commit-msg

  visual:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor: 3.3a — Debian 12 bookworm, RHEL 9, anything from 2022 on.
        # 3.4 ships in Ubuntu 24.04 LTS (noble), 3.5a is the previous
        # upstream stable, 3.6a is current upstream.
        tmux: ['3.3a', '3.4', '3.5a', '3.6a']
    name: visual (tmux ${{ matrix.tmux }})
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libevent-dev libncurses-dev pkg-config bison
      - name: Cache tmux ${{ matrix.tmux }}
        id: cache-tmux
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/tmux-bin
          key: tmux-${{ matrix.tmux }}-${{ runner.os }}
      - name: Build tmux ${{ matrix.tmux }}
        if: steps.cache-tmux.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cd /tmp
          curl -fLsS -o "tmux-${{ matrix.tmux }}.tar.gz" \
            "https://github.com/tmux/tmux/releases/download/${{ matrix.tmux }}/tmux-${{ matrix.tmux }}.tar.gz"
          tar xf "tmux-${{ matrix.tmux }}.tar.gz"
          cd "tmux-${{ matrix.tmux }}"
          ./configure --prefix="$HOME/tmux-bin"
          make -j"$(nproc)"
          make install
      - name: Put tmux on PATH
        run: echo "$HOME/tmux-bin/bin" >> "$GITHUB_PATH"
      - name: Show tmux version
        run: tmux -V
      - name: Run visual snapshot tests
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
        run: ./tests/visual.sh
