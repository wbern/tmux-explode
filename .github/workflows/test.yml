name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell sources
        run: shellcheck -S warning scripts/*.sh tests/*.sh hooks/commit-msg

  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Show tmux version
        run: tmux -V
      - name: Run visual snapshot tests
        run: ./tests/visual.sh
