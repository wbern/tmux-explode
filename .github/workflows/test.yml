name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Show tmux version
        run: tmux -V
      - name: Run visual snapshot tests
        run: ./tests/visual.sh
