name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the release job on the auto-commit semantic-release itself pushes
    # back to main (the [skip ci] tag in the commit-msg template won't stop
    # GitHub Actions, only some other CIs honor it). Without this guard the
    # workflow would loop on every release.
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
          cache: npm
      - name: Install pinned semantic-release toolchain
        # `npm ci` installs exactly what's in package-lock.json — no minor-
        # version drift between runs, no surprise transitive updates.
        run: npm ci
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
